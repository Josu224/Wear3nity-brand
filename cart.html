<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart | WEAR3NITY</title>
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>

  <!-- NAVBAR -->
  <header class="navbar light">

    <div class="hamburger" onclick="toggleMenu()">☰</div>

    <nav class="nav-left">
      <a href="shop.html">Shop</a>
      <a href="gallery.html">Gallery</a>
      <a href="about.html">About</a>
    </nav>

    <div class="logo">WEAR3NITY</div>

    <nav class="nav-right">
      <a href="profile.html" class="icon">👤</a>
      <a href="cart.html" class="icon cart-link active">
        🛒 <span id="cart-count">0</span>
      </a>
    </nav>

  </header>

  <!-- MOBILE MENU -->
  <div id="mobile-menu" class="mobile-menu">
    <div class="menu-header">
      <span class="close-btn" onclick="toggleMenu()">✕</span>
    </div>

    <a href="shop.html" onclick="toggleMenu()">Shop</a>
    <a href="gallery.html" onclick="toggleMenu()">Gallery</a>
    <a href="about.html" onclick="toggleMenu()">About</a>
  </div>

  <div id="menu-overlay" class="menu-overlay" onclick="toggleMenu()"></div>

  <!-- CART PAGE -->
  <section class="container cart-page">

    <h1 class="page-title">Your Cart</h1>

    <!-- CART ITEMS -->
    <div id="cart-items" class="cart-items"></div>

    <!-- TOTAL + CHECKOUT -->
    <div class="cart-summary">
      <h2 id="cart-total"></h2>

    <button id="checkout-btn" class="btn primary" style="display:none;"></button>
        Checkout via WhatsApp
      </button>
    </div>

  </section>

  <script src="js/cart.js"></script>
  <script src="js/ui.js"></script>

</body>

</html>
