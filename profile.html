<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile | WEAR3NITY</title>
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>

  <!-- NAVBAR (same as others) -->
  <header class="navbar light">

    <div class="hamburger" onclick="toggleMenu()">☰</div>

    <nav class="nav-left">
      <a href="shop.html">Shop</a>
      <a href="gallery.html">Gallery</a>
      <a href="about.html">About</a>
    </nav>

    <div class="logo">WEAR3NITY</div>

    <nav class="nav-right">
      <a href="profile.html" class="icon active">👤</a>
      <a href="cart.html" class="icon cart-link">
        🛒 <span id="cart-count">0</span>
      </a>
    </nav>

  </header>

  <!-- MOBILE MENU -->
  <div id="mobile-menu" class="mobile-menu">
    <div class="menu-header">
      <span class="close-btn" onclick="toggleMenu()">✕</span>
    </div>

    <a href="shop.html" onclick="toggleMenu()">Shop</a>
    <a href="gallery.html" onclick="toggleMenu()">Gallery</a>
    <a href="about.html" onclick="toggleMenu()">About</a>
  </div>

  <div id="menu-overlay" class="menu-overlay" onclick="toggleMenu()"></div>

<!-- PROFILE DASHBOARD -->
<section class="profile container">

  <h1 class="page-title">My Account</h1>

  <div class="profile-grid">

    <!-- LEFT: AVATAR -->
    <div class="profile-left">
      <div class="avatar">
        <img id="avatar-img" src="assets/images/user.png" alt="User">
      </div>

      <input type="file" id="avatar-input" accept="image/*" hidden>
      <button class="btn small" onclick="changeAvatar()">Change Photo</button>
    </div>

    <!-- RIGHT: DETAILS -->
    <div class="profile-right">

      <div class="form-group">
        <label>Name</label>
        <input type="text" id="user-name" placeholder="Your name">
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" id="user-email" placeholder="Your email">
      </div>

      <div class="form-group">
        <label>Phone</label>
        <input type="text" id="user-phone" placeholder="Your phone number">
      </div>

      <div class="profile-actions">
        <button class="btn primary" onclick="saveProfile()">Save Changes</button>
        <button class="btn" onclick="logout()">Logout</button>
      </div>

    </div>

  </div>

</section>

<!-- USER INFO FORM -->
<div class="profile-form">

  <div class="form-group">
    <input type="text" id="name" required >
    <label for="name">Full Name</label>
  </div>

  <div class="form-group">
    <input type="tel" id="phone" required>
    <label for="phone">Phone Number</label>
  </div>

  <div class="form-group">
    <textarea id="address" rows="3" required></textarea>
    <label for="address">Delivery Address</label>
  </div>

  <button onclick="saveUserInfo()" class="btn primary full">
    Save Profile
  </button>

</div>

  <script src="js/ui.js"></script>
  <script src="js/profile.js"></script>

</body>

</html>
